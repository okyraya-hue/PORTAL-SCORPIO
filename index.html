<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorpio Portal</title>

<style>
body{
margin:0;
font-family:'Segoe UI',system-ui;
background:#0b1220;
color:#e5e7eb;
}

/* HEADER */
header{
padding:16px 24px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(15,23,42,0.7);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.05);
position:sticky;
top:0;
}

.logo{
color:#f43f5e;
font-weight:600;
font-size:18px;
}

nav button{
margin:5px;
padding:8px 14px;
border:none;
border-radius:999px;
background:rgba(255,255,255,0.05);
color:#e5e7eb;
cursor:pointer;
transition:0.2s;
}
nav button:hover{
background:#f43f5e;
color:white;
}

/* HERO */
.hero{
text-align:center;
padding:50px 20px 30px;
max-width:600px;
margin:auto;
}

.hero h1{
font-size:28px;
font-weight:600;
color:#f8fafc;
}

.hero p{
opacity:0.6;
font-size:14px;
}

/* SECTION */
.section{
display:none;
padding:20px;
max-width:900px;
margin:auto;
}
.active{display:block;}

/* CARD */
.card{
background:rgba(255,255,255,0.04);
padding:18px;
border-radius:18px;
margin:10px 0;
cursor:pointer;
transition:0.25s;
border:1px solid rgba(255,255,255,0.05);
}
.card:hover{
transform:translateY(-4px);
background:rgba(255,255,255,0.08);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}
@media(max-width:600px){
.grid{grid-template-columns:1fr;}
}

/* INPUT */
input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.05);
background:#020617;
color:white;
margin:6px 0;
}

/* BUTTON */
.btn{
display:block;
margin-top:12px;
padding:12px;
border:none;
border-radius:12px;
background:#f43f5e;
color:white;
text-align:center;
cursor:pointer;
}
.copy{background:#3b82f6;}

footer{
text-align:center;
padding:25px;
font-size:12px;
opacity:0.4;
}
</style>
</head>

<body>

<header>
<div class="logo">🦂 Scorpio Portal</div>
<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('cek')">Cek</button>
<button onclick="show('artikel')">Artikel</button>
</nav>
</header>

<div class="hero">
<h1>Scorpio Insight & Personality</h1>
<p>Eksplorasi karakter, cinta, dan energi Scorpio</p>
</div>

<!-- HOME -->
<div id="home" class="section active">
<h2>🔥 Trending</h2>
<div class="grid" id="trending"></div>

<div class="card">
🔥 Tag temanmu dan bandingkan hasilnya!
</div>
</div>

<!-- CEK -->
<div id="cek" class="section">
<h2>Cek Scorpio Kamu</h2>

<input id="nama" placeholder="Nama">
<input id="tgl" type="number" placeholder="Tanggal">
<input id="bln" type="number" placeholder="Bulan (10/11)">

<button class="btn" onclick="cek()">🔮 Lihat Hasil</button>

<div id="hasil" class="card" style="display:none;"></div>
</div>

<!-- ARTIKEL -->
<div id="artikel" class="section">
<h2>🆕 Artikel</h2>

<input id="search" placeholder="Cari artikel..." onkeyup="cari()">

<div id="listArtikel"></div>
</div>

<!-- DETAIL -->
<div id="detail" class="section">
<div class="card">
<h1 id="judul"></h1>
<p id="isi"></p>

<button class="btn" onclick="shareWA()">📲 Share</button>
<button class="btn copy" onclick="copyLink()">🔗 Copy Link</button>
<button class="btn" onclick="show('home')">⬅ Kembali</button>
</div>
</div>

<footer>
© 2026 Scorpio Portal
</footer>

<script>

function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* DATA */
const artikelData=[
{judul:"Karakter Scorpio",isi:"Scorpio kuat, misterius,peka,tatapan tajam, dan penuh ambisi."},
{judul:"Rahasia Scorpio",isi:"Scorpio tertutup tapi sangat setia."},
{judul:"Cinta Scorpio",isi:"Cinta Scorpio dalam dan totalitas."},
{judul:"Kelebihan Scorpio",isi:"Berani, setia, dan bertekad kuat."},
{judul:"Kelemahan Scorpio",isi:"Cemburuan,posesif, dan sulit melupakan masa lalu."},
{judul:"Keuangan Scorpio",isi:"Pandai mengatur strategi keuangan meski terkadang boros."}
];

/* TRENDING TANPA DUPLIKAT */
let used=[];
let t="";

while(used.length<4){
let r=Math.floor(Math.random()*artikelData.length);
if(!used.includes(r)){
used.push(r);
t+=`<div class="card" onclick="buka(${r})">${artikelData[r].judul}</div>`;
}
}
document.getElementById("trending").innerHTML=t;

/* LIST */
function tampil(data){
let h="";
data.forEach((a,i)=>{
h+=`<div class="card" onclick="buka(${i})"><h3>${a.judul}</h3><p>${a.isi}</p></div>`;
});
document.getElementById("listArtikel").innerHTML=h;
}
tampil(artikelData);

/* SEARCH */
function cari(){
let k=document.getElementById("search").value.toLowerCase();
tampil(artikelData.filter(a=>a.judul.toLowerCase().includes(k)));
}

/* DETAIL */
let currentId=0;
function buka(id){
currentId=id;
document.getElementById("judul").innerText=artikelData[id].judul;
document.getElementById("isi").innerText=artikelData[id].isi;
show('detail');
}

/* CEK */
function cek(){
let nama=document.getElementById("nama").value||"Kamu";
let hoki=Math.floor(Math.random()*100);

document.getElementById("hasil").style.display="block";
document.getElementById("hasil").innerHTML=`
<h3>${nama}</h3>
<p>🔥 Hoki: ${hoki}%</p>
<p>❤️ Cinta penuh misteri</p>
<p>💰 Rezeki naik</p>
<p>🎨 Hitam,Maroon,Merah,Unggu,Navy Blue</p>
`;
}

/* SHARE */
function shareWA(){
let text=encodeURIComponent(artikelData[currentId].judul);
window.open(`https://wa.me/?text=${text}`);
}

function copyLink(){
navigator.clipboard.writeText(window.location.href);
alert("Link disalin!");
}

</script>

</body>
</html>
