<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorpio Portal 🔮</title>
<style>
body{margin:0;font-family:'Segoe UI',system-ui;background:#0b1220;color:#e5e7eb;}
header{padding:12px 16px;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:10px;background:rgba(15,23,42,0.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.05);position:sticky;top:0;z-index:10;}
.logo{color:#f43f5e;font-weight:600;font-size:16px;}
nav{display:flex;flex-wrap:wrap;gap:6px;width:100%;}
nav button{flex:1;min-width:80px;padding:10px;border:none;border-radius:999px;background:rgba(255,255,255,0.05);color:#e5e7eb;cursor:pointer;font-size:13px;}
.hero{text-align:center;padding:30px 15px 20px;}
.hero h1{font-size:22px;}
.hero p{font-size:13px;opacity:0.7;}
.section{display:none;padding:15px;}
.active{display:block;}
.card{background:rgba(255,255,255,0.05);padding:16px;border-radius:16px;margin:8px 0;font-size:14px;}
.grid{display:grid;grid-template-columns:1fr;gap:10px;}
input{width:100%;padding:14px;border-radius:12px;font-size:14px;border:none;background:#020617;color:white;margin:6px 0;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:#f43f5e;color:white;font-size:14px;margin-top:10px;cursor:pointer;}
.copy{background:#3b82f6;}
footer{text-align:center;padding:20px;font-size:11px;opacity:0.5;margin-bottom:60px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:#020617;padding:10px;border-top:1px solid rgba(255,255,255,0.05);}
.bottom-nav button{background:none;border:none;color:white;font-size:18px;cursor:pointer;}
</style>
</head>
<body>

<header>
<div class="logo">🦂 Scorpio Portal</div>
<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('cek')">Cek</button>
<button onclick="show('artikel')">Artikel</button>
</nav>
</header>

<div class="hero">
<h1>Scorpio Insight & Personality</h1>
<p>Eksplorasi karakter, cinta, dan energi Scorpio</p>
</div>

<div id="home" class="section active">
<h2>🔥 Trending</h2>
<div class="grid" id="trending"></div>
<div class="card">🔥 Tag temanmu dan bandingkan hasilnya!</div>
</div>

<div id="cek" class="section">
<h2>Cek Scorpio Kamu</h2>
<input id="nama" placeholder="Nama">
<input id="tgl" type="number" placeholder="Tanggal">
<input id="bln" type="number" placeholder="Bulan (10/11)">
<button class="btn" onclick="cek()">🔮 Lihat Hasil</button>
<div id="hasil" class="card" style="display:none;"></div>
</div>

<div id="artikel" class="section">
<h2>🆕 Artikel</h2>
<input id="search" placeholder="Cari artikel..." onkeyup="cari()">
<div id="listArtikel"></div>
</div>

<div id="detail" class="section">
<div class="card">
<h1 id="judul"></h1>
<p id="isi"></p>
<button class="btn" onclick="shareWA()">📲 Share</button>
<button class="btn copy" onclick="copyLink()">🔗 Copy Link</button>
<button class="btn" onclick="show('home')">⬅ Kembali</button>
</div>
</div>

<footer>© 2026 Scorpio Portal</footer>

<div class="bottom-nav">
<button onclick="show('home')">🏠</button>
<button onclick="show('cek')">🔮</button>
<button onclick="show('artikel')">📚</button>
</div>

<script>
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
window.scrollTo(0,0);
}

const artikelData=[
{judul:"Karakter Scorpio",isi:"Scorpio kuat, misterius, dan penuh ambisi."},
{judul:"Rahasia Scorpio",isi:"Scorpio tertutup tapi sangat setia."},
{judul:"Cinta Scorpio",isi:"Cinta Scorpio dalam dan totalitas."},
{judul:"Kelebihan Scorpio",isi:"Berani, setia, dan bertekad kuat."},
{judul:"Kelemahan Scorpio",isi:"Cemburuan dan sulit melupakan masa lalu."},
{judul:"Keuangan Scorpio",isi:"Pandai mengatur strategi keuangan."}
];

let used=[],t="";
while(used.length<4){
let r=Math.floor(Math.random()*artikelData.length);
if(!used.includes(r)){used.push(r);t+=`<div class="card" onclick="buka(${r})">${artikelData[r].judul}</div>`;}
}
document.getElementById("trending").innerHTML=t;

function tampil(data){
let h="";
data.forEach((a,i)=>{h+=`<div class="card" onclick="buka(${i})"><h3>${a.judul}</h3><p>${a.isi}</p></div>`;});
document.getElementById("listArtikel").innerHTML=h;
}
tampil(artikelData);

function cari(){
let k=document.getElementById("search").value.toLowerCase();
tampil(artikelData.filter(a=>a.judul.toLowerCase().includes(k)));
}

let currentId=0;
function buka(id){
currentId=id;
document.getElementById("judul").innerText=artikelData[id].judul;
document.getElementById("isi").innerText=artikelData[id].isi;
show('detail');
}

function cek(){
let nama=document.getElementById("nama").value||"Kamu";
let hoki=Math.floor(Math.random()*100);
document.getElementById("hasil").style.display="block";
document.getElementById("hasil").innerHTML=`<h3>${nama}</h3><p>🔥 Hoki: ${hoki}%</p>`;
}

function shareWA(){
let text=encodeURIComponent(artikelData[currentId].judul);
window.open(`https://wa.me/?text=${text}`);
}

function copyLink(){
navigator.clipboard.writeText(window.location.href);
alert("Link disalin!");
}
</script>

</body>
</html>
